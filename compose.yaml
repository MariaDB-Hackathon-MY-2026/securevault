services:
  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: secure-vault/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: secure-vault/Dockerfile
    command: ["npm", "run", "worker:embeddings"]
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mariadb:
    image: mariadb:12-noble
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-securevault_root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-SecureVault}
      MARIADB_USER: ${MARIADB_USER:-securevault}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-securevault}
      MARIADB_AUTO_UPGRADE: "1"
    command:
      - mariadbd
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - securevault-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    volumes:
      - securevault-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  securevault-mariadb-data:
  securevault-redis-data:
