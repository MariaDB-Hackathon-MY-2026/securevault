x-app-service: &app-service
  build:
    context: .
    dockerfile: secure-vault/Dockerfile
  depends_on:
    mariadb:
      condition: service_healthy
    redis:
      condition: service_started
  environment:
    DATABASE_HOST: mariadb
    DATABASE_PORT: 3306
    DATABASE_NAME: ${DATABASE_NAME:-SecureVault}
    DATABASE_USER: ${DATABASE_USER:-securevault}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD:-securevault}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  restart: unless-stopped

services:
  web:
    <<: *app-service
    profiles: ["app"]
    ports:
      - "3000:3000"

  worker:
    <<: *app-service
    profiles: ["worker"]
    command: ["npm", "run", "worker:embeddings"]

  mariadb:
    image: mariadb:12-noble
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-securevault_root}
      MARIADB_DATABASE: ${DATABASE_NAME:-SecureVault}
      MARIADB_USER: ${DATABASE_USER:-securevault}
      MARIADB_PASSWORD: ${DATABASE_PASSWORD:-securevault}
      MARIADB_AUTO_UPGRADE: "1"
    command:
      - mariadbd
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - securevault-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    volumes:
      - securevault-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  securevault-mariadb-data:
  securevault-redis-data:
